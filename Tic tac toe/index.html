<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Tic Tac Toe</h1>
        
        <!-- Score Board -->
        <div class="score-board">
            <div class="score">
                <h3>Player X</h3>
                <span id="scoreX">0</span>
            </div>
            <div class="score">
                <h3>Draws</h3>
                <span id="scoreDraw">0</span>
            </div>
            <div class="score">
                <h3>Player O</h3>
                <span id="scoreO">0</span>
            </div>
        </div>

        <!-- Game Information -->
        <div class="game-info">
            Current Player: <span class="current-player" id="currentPlayer">X</span>
        </div>

        <!-- Game Board -->
        <div class="game-board" id="gameBoard">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>

        <!-- Game Status -->
        <div class="game-status" id="gameStatus">
            Game in progress...
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="reset-btn" id="resetBtn">New Game</button>
            <button class="reset-btn" id="clearScoreBtn">Clear Scores</button>
        </div>
    </div>

    <!-- Link to external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
